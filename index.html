<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloxia - Account System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --rbx-bg: #191b1d;
            --rbx-sidebar: #212529;
            --rbx-blue: #0084ff;
            --rbx-success: #00b06f;
            --rbx-danger: #ff4444;
            --white: #ffffff;
        }

        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--rbx-bg); color: var(--white); height: 100vh; overflow: hidden; }

        /* PANTALLA DE AUTENTICACIÓN */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.rbxcdn.com/f3000693a18a99477d94944f2d7d8e8b.jpg');
            background-size: cover; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .auth-card { background: white; color: #333; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card h2 { margin-top: 0; color: #111; }
        .auth-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .btn { border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 10px; transition: 0.2s; }
        .btn-success { background: var(--rbx-success); color: white; }
        .btn-blue { background: var(--rbx-blue); color: white; }
        .btn-danger { background: var(--rbx-danger); color: white; }

        /* DASHBOARD */
        #main-dashboard { display: none; height: 100vh; grid-template-columns: 220px 1fr; }
        nav { background-color: var(--rbx-sidebar); padding: 20px 10px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .nav-link { display: block; color: #ccc; text-decoration: none; padding: 12px; margin: 5px 0; border-radius: 6px; cursor: pointer; }
        .nav-link.active, .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }

        main { padding: 30px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; }
        .section { display: none; }
        .section.active { display: block; }

        #avatar-box { background: #000; height: 400px; border-radius: 12px; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title">Iniciar Sesión</h2>
        <input type="text" id="auth-user" placeholder="Usuario o Correo">
        <input type="password" id="auth-pass" placeholder="Contraseña">
        <button class="btn btn-success" id="primary-auth-btn" onclick="login()">Entrar</button>
        <p style="font-size: 0.8rem; margin: 15px 0;">¿No tienes cuenta?</p>
        <button class="btn btn-blue" onclick="toggleAuthMode()" id="secondary-auth-btn">Crear Cuenta Nueva</button>
    </div>
</div>

<div id="main-dashboard">
    <nav>
        <div style="font-weight: bold; font-size: 1.4rem; margin-bottom: 30px; color: var(--rbx-blue);">ROBLOXIA</div>
        <div class="nav-link active" onclick="showSection('inicio')">🏠 Inicio</div>
        <div class="nav-link" onclick="showSection('perfil')">👤 Perfil</div>
        <div class="nav-link" onclick="showSection('avatar')">👕 Avatar</div>
        <div class="btn btn-blue" style="margin-top: auto;">CREAR (Studio)</div>
    </nav>

    <main>
        <div class="top-bar">
            <div style="font-size: 1.4rem;">Hola, <b id="user-display">jheiber</b>!</div>
            <div style="color: #ffd700; font-weight: bold;">💰 <span id="robux-val">0</span> Robux</div>
        </div>

        <div id="sec-inicio" class="section active">
            <h3>Bienvenido de nuevo</h3>
            <p>Tu sesión está activa. Ahora puedes acceder al motor de juegos o personalizar tu avatar.</p>
        </div>

        <div id="sec-perfil" class="section">
            <div style="background: #232527; padding: 20px; border-radius: 12px;">
                <h3>Configuración de Perfil</h3>
                <p>Usuario: <b id="profile-name"></b></p>
                <hr style="border: 0.5px solid #444; margin: 20px 0;">
                <button class="btn btn-danger" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <div id="sec-avatar" class="section">
            <div id="avatar-box"></div>
        </div>
    </main>
</div>

<script>
    let isRegistering = false;
    let currentUser = null;

    // --- SISTEMA DE CUENTAS ---
    function toggleAuthMode() {
        isRegistering = !isRegistering;
        document.getElementById('auth-title').innerText = isRegistering ? "Crear Cuenta" : "Iniciar Sesión";
        document.getElementById('primary-auth-btn').innerText = isRegistering ? "Registrarse" : "Entrar";
        document.getElementById('secondary-auth-btn').innerText = isRegistering ? "Ya tengo cuenta" : "Crear Cuenta Nueva";
    }

    function login() {
        const user = document.getElementById('auth-user').value;
        const pass = document.getElementById('auth-pass').value;
        if (!user || !pass) return alert("Completa los campos");

        let accounts = JSON.parse(localStorage.getItem('rbx_accounts') || "{}");

        if (isRegistering) {
            if (accounts[user]) return alert("El usuario ya existe");
            accounts[user] = { pass: pass, robux: 0 };
            localStorage.setItem('rbx_accounts', JSON.stringify(accounts));
            alert("Cuenta creada con éxito");
            isRegistering = false;
            toggleAuthMode();
        } else {
            if (accounts[user] && accounts[user].pass === pass) {
                currentUser = user;
                loadDashboard(accounts[user]);
            } else {
                alert("Usuario o contraseña incorrectos");
            }
        }
    }

    function loadDashboard(data) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'grid';
        document.getElementById('user-display').innerText = currentUser;
        document.getElementById('profile-name').innerText = currentUser;
        document.getElementById('robux-val').innerText = data.robux;
        initAvatar();
    }

    function logout() {
        currentUser = null;
        document.getElementById('main-dashboard').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('auth-user').value = "";
        document.getElementById('auth-pass').value = "";
    }

    function showSection(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('sec-' + name).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- AVATAR 3D CON PIERNAS ---
    function initAvatar() {
        const container = document.getElementById('avatar-box');
        if(container.children.length > 0) return;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.offsetWidth / 400, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.offsetWidth, 400);
        container.appendChild(renderer.domElement);

        const group = new THREE.Group();
        // Cabeza, Torso y PIERNAS
        const bodyMat = new THREE.MeshStandardMaterial({color: 0x3d3d3d});
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.4;
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2, 0.7), bodyMat);
        const legL = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 0.6), new THREE.MeshStandardMaterial({color: 0x111111}));
        legL.position.set(-0.4, -2, 0);
        const legR = legL.clone(); legR.position.x = 0.4;
        
        group.add(head, torso, legL, legR);
        scene.add(group, new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(2, 2, 5); scene.add(light);
        camera.position.z = 6;

        function animate() { requestAnimationFrame(animate); group.rotation.y += 0.02; renderer.render(scene, camera); }
        animate();
    }
</script>
</body>
            </html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloxia - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --rbx-bg: #191b1d; --rbx-sidebar: #212529; --rbx-blue: #0084ff; --rbx-success: #00b06f; --white: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: sans-serif; background-color: var(--rbx-bg); color: var(--white); height: 100vh; overflow: hidden; }
        
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: white; color: #333; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        .auth-card input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        #main-dashboard { display: none; height: 100vh; grid-template-columns: 200px 1fr; }
        nav { background: var(--rbx-sidebar); padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .nav-link { color: #ccc; text-decoration: none; padding: 12px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; }
        .nav-link:hover, .active { background: rgba(255,255,255,0.1); color: white; }
        
        .btn { border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; text-decoration: none; display: inline-block; text-align: center; }
        .btn-blue { background: var(--rbx-blue); color: white; }
        .btn-success { background: var(--rbx-success); color: white; }
        
        main { padding: 30px; overflow-y: auto; }
        .avatar-box { background: #000; height: 350px; border-radius: 10px; margin-top: 20px; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 id="auth-title">Login</h2>
        <input type="text" id="auth-user" placeholder="Usuario">
        <input type="password" id="auth-pass" placeholder="Contraseña">
        <button class="btn btn-success" onclick="login()">Entrar</button>
        <p style="font-size: 12px; margin-top: 15px; cursor: pointer;" onclick="toggleAuth()">¿Crear cuenta nueva?</p>
    </div>
</div>

<div id="main-dashboard">
    <nav>
        <div style="font-weight: bold; margin-bottom: 20px;">ROBLOXIA</div>
        <div class="nav-link active" onclick="showSec('inicio')">Inicio</div>
        <div class="nav-link" onclick="showSec('perfil')">Perfil</div>
        <a href="studio.html" class="btn btn-blue" style="margin-top: auto;">CREAR (Studio)</a>
    </nav>
    <main>
        <div id="sec-inicio">
            <h1>Hola, <span id="user-name"></span>!</h1>
            <div class="avatar-box" id="avatar-3d"></div>
        </div>
        <div id="sec-perfil" style="display:none;">
            <h2>Mi Perfil</h2>
            <button class="btn btn-blue" style="background: #ff4444;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </main>
</div>

<script>
    let isReg = false;
    function toggleAuth() { 
        isReg = !isReg; 
        document.getElementById('auth-title').innerText = isReg ? "Registro" : "Login";
    }

    function login() {
        const user = document.getElementById('auth-user').value;
        const pass = document.getElementById('auth-pass').value;
        if(!user || !pass) return alert("Llena los campos");
        
        let db = JSON.parse(localStorage.getItem('cuentas') || "{}");
        if(isReg) {
            db[user] = pass;
            localStorage.setItem('cuentas', JSON.stringify(db));
            alert("Cuenta creada!");
            isReg = false; toggleAuth();
        } else {
            if(db[user] === pass) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'grid';
                document.getElementById('user-name').innerText = user;
                init3D();
            } else { alert("Error de datos"); }
        }
    }

    function showSec(name) {
        document.getElementById('sec-inicio').style.display = name === 'inicio' ? 'block' : 'none';
        document.getElementById('sec-perfil').style.display = name === 'perfil' ? 'block' : 'none';
    }

    function init3D() {
        const cont = document.getElementById('avatar-3d');
        const scene = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(75, cont.offsetWidth/350, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
        renderer.setSize(cont.offsetWidth, 350); cont.appendChild(renderer.domElement);
        
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.8), new THREE.MeshStandardMaterial({color: 0x3d3d3d}));
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.5;
        const l1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), new THREE.MeshStandardMaterial({color: 0x111}));
        l1.position.set(-0.3, -1.5, 0);
        const l2 = l1.clone(); l2.position.x = 0.3;
        group.add(body, head, l1, l2);
        scene.add(group, new THREE.AmbientLight(0xffffff, 0.8));
        cam.position.z = 5;
        function animate() { requestAnimationFrame(animate); group.rotation.y += 0.02; renderer.render(scene, cam); }
        animate();
    }
</script>
</body>
    </html>

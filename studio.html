<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloxia Studio - Old School Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/vs/editor/editor.main.min.css">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        
        /* Interfaz de Studio */
        #editor-pane {
            position: absolute; bottom: 20px; right: 20px;
            width: 400px; height: 300px;
            background: #1e1e1e; border: 2px solid #444;
            border-radius: 8px; display: flex; flex-direction: column;
        }
        #monaco-container { flex-grow: 1; }
        .pane-header { padding: 10px; background: #333; display: flex; justify-content: space-between; align-items: center; }
        
        /* Chat Old School */
        #chat-box {
            position: absolute; top: 10px; left: 10px;
            width: 300px; height: 150px;
            background: rgba(0,0,0,0.5); color: white;
            padding: 10px; font-size: 14px; overflow-y: auto;
            pointer-events: none;
        }
        #chat-input {
            position: absolute; top: 165px; left: 10px;
            background: rgba(0,0,0,0.7); border: 1px solid #555;
            color: white; padding: 5px; width: 290px;
        }

        /* Burbuja de texto (BillboardGui) */
        .bubble {
            position: absolute; background: white; color: black;
            padding: 5px 10px; border-radius: 10px; border: 2px solid #000;
            font-weight: bold; pointer-events: none; transform: translate(-50%, -100%);
            display: none;
        }

        .btn-run { background: #00ff00; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="container"></div>
<div id="chat-box"></div>
<input type="text" id="chat-input" placeholder="Presiona Enter para chatear...">
<div id="chat-bubble" class="bubble"></div>

<div id="editor-pane">
    <div class="pane-header">
        <span style="color: white; font-size: 12px;">SCRIPT EDITOR (LUA SIM)</span>
        <button class="btn-run" onclick="executeScript()">RUN</button>
    </div>
    <div id="monaco-container"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/vs/loader.min.js"></script>
<script>
    // --- CONFIGURACIÓN DE THREE.JS ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Cielo Roblox
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    // Luz
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7);
    scene.add(light, new THREE.AmbientLight(0x404040));

    // Suelo (Baseplate)
    const baseplate = new THREE.Mesh(
        new THREE.BoxGeometry(100, 1, 100),
        new THREE.MeshStandardMaterial({ color: 0x3A3A3A })
    );
    baseplate.position.y = -0.5;
    scene.add(baseplate);

    // Jugador (Cuerpo tipo Old School)
    const player = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x00ff00}));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0xffdbac}));
    head.position.y = 1.4;
    player.add(body, head);
    scene.add(player);

    // Controles de Cámara (Orbit modificado)
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.mouseButtons = { RIGHT: THREE.MOUSE.ROTATE }; // Solo rotar con click derecho
    camera.position.set(5, 5, 10);
    controls.update();

    // --- API TIPO LUA ---
    const game = {
        Workspace: {
            Part: {
                set Color(val) { body.material.color.set(val); },
                set Size(val) { body.scale.set(val, val, val); }
            }
        },
        print: (txt) => {
            const chat = document.getElementById('chat-box');
            chat.innerHTML += `<div>[System]: ${txt}</div>`;
        }
    };

    // --- EDITOR MONACO ---
    let editor;
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('monaco-container'), {
            value: "game.Workspace.Part.Color = 'Red';\ngame.print('Script ejecutado!');",
            language: 'javascript',
            theme: 'vs-dark',
            minimap: { enabled: false }
        });
    });

    function executeScript() {
        try {
            eval(editor.getValue());
        } catch(e) {
            alert("Error en el script: " + e);
        }
    }

    // --- SISTEMA DE CHAT Y BURBUJAS ---
    const chatInput = document.getElementById('chat-input');
    const chatBox = document.getElementById('chat-box');
    const bubble = document.getElementById('chat-bubble');

    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && chatInput.value !== "") {
            const msg = chatInput.value;
            chatBox.innerHTML += `<div><b>Jugador:</b> ${msg}</div>`;
            showBubble(msg);
            chatInput.value = "";
        }
    });

    function showBubble(text) {
        bubble.innerText = text;
        bubble.style.display = 'block';
        setTimeout(() => { bubble.style.display = 'none'; }, 5000);
    }

    // --- MOVIMIENTO WASD ---
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function updateMovement() {
        const speed = 0.1;
        if (keys['KeyW']) player.position.z -= speed;
        if (keys['KeyS']) player.position.z += speed;
        if (keys['KeyA']) player.position.x -= speed;
        if (keys['KeyD']) player.position.x += speed;
        if (keys['Space'] && player.position.y <= 0) player.position.y += 0.5; // Salto simple
        if (player.position.y > 0) player.position.y -= 0.02; // Gravedad
    }

    // --- BUCLE DE RENDERIZADO ---
    function animate() {
        requestAnimationFrame(animate);
        updateMovement();
        
        // Actualizar posición de la burbuja sobre la cabeza
        const vector = head.position.clone();
        vector.y += 2; // Arriba de la cabeza
        player.localToWorld(vector);
        vector.project(camera);
        
        const x = (vector.x * .5 + .5) * window.innerWidth;
        const y = (vector.y * -.5 + .5) * window.innerHeight;
        bubble.style.left = `${x}px`;
        bubble.style.top = `${y}px`;

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
  </html>

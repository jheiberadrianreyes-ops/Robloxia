<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloxia Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(20,20,20,0.9); padding: 15px; z-index: 10; border-top: 1px solid #444; }
        textarea { width: 100%; height: 60px; background: #000; color: #0f0; border: 1px solid #333; padding: 5px; font-family: monospace; border-radius: 5px; }
        .btn-run { background: #00ff00; border: none; padding: 10px; width: 100%; font-weight: bold; margin-top: 5px; border-radius: 5px; }
        #chat { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div id="chat">Sistema: Motor de Scripts Listo.</div>
<div id="canvas-cont"></div>

<div id="ui">
    <textarea id="code">game.Workspace.Part.Color = 'Red';
game.print('¡Objeto cambiado!');</textarea>
    <button class="btn-run" onclick="run()">EJECUTAR LUA</button>
    <a href="index.html" style="color: #888; display: block; text-align: center; margin-top: 5px; font-size: 12px; text-decoration: none;">Cerrar Studio</a>
</div>

<script>
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
    const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer(); renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-cont').appendChild(renderer.domElement);

    const base = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color: 0x333333}));
    base.rotation.x = -Math.PI/2; scene.add(base);
    
    const part = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshStandardMaterial({color: 0x00ff00}));
    part.position.y = 1.1; scene.add(part);

    const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(5,5,5); scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));
    cam.position.set(0, 5, 8); cam.lookAt(0,0,0);

    const game = {
        Workspace: { Part: { set Color(c) { part.material.color.set(c); } } },
        print: (t) => { document.getElementById('chat').innerText = t; }
    };

    function run() { try { eval(document.getElementById('code').value); } catch(e) { alert(e); } }
    function animate() { requestAnimationFrame(animate); part.rotation.y += 0.01; renderer.render(scene, cam); }
    animate();
</script>
</body>
</html>
